<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0B1638">

<title>DigiFrota 3.0</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  background:#F0F3FA;
}

/* ===== FAB ===== */
.guincho-fab{
  position:fixed;
  bottom:20px;
  right:16px;
  background:#1A8CC8;
  color:#fff;
  border:none;
  border-radius:30px;
  padding:12px 16px;
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 4px 18px rgba(26,140,200,.5);
}

/* ===== OVERLAY ===== */
.guincho-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  z-index:999;
}

.guincho-overlay.show{
  display:flex;
  align-items:flex-end;
}

/* ===== MODAL ===== */
.guincho-sheet{
  width:100%;
  max-width:480px;
  margin:auto;
  background:#fff;
  border-radius:24px 24px 0 0;
  padding-bottom:20px;
}

/* HEADER */
.guincho-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px;
  border-bottom:1px solid #eee;
}

.gente-logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.gente-star{
  width:36px;
  height:36px;
}

.gente-nome{
  font-size:20px;
  font-weight:800;
  color:#1A5276;
}

.gente-sub{
  font-size:12px;
  color:#1A8CC8;
}

/* CARDS */
.guincho-cards{
  display:grid;
  grid-template-columns:repeat(3, minmax(0,1fr));
  gap:12px;
  padding:16px;
}

@media (max-width:420px){
  .guincho-cards{
    grid-template-columns:1fr 1fr;
  }
}

.guincho-card{
  background:#1A8CC8;
  border-radius:16px;
  padding:20px 12px;
  text-align:center;
  color:#fff;
  min-height:150px;
}

.guincho-card-ico{
  width:56px;
  height:56px;
  background:rgba(255,255,255,.2);
  border-radius:50%;
  margin:0 auto 14px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.guincho-card-lbl{
  font-size:12px;
  font-weight:700;
  margin-bottom:6px;
}

.guincho-card-num{
  font-size:13px;
  font-weight:800;
}

/* INFO */
.guincho-info{
  margin:0 16px;
  background:#F7F9FC;
  border-radius:14px;
  padding:14px;
  font-size:13px;
}

/* BOTÃO FECHAR */
.close-btn{
  cursor:pointer;
  font-size:20px;
  color:#777;
}
</style>
</head>

<body>

<!-- BOTÃO -->
<button class="guincho-fab" onclick="openGuincho()">
☎ Precisa de guincho?
</button>

<!-- MODAL -->
<div class="guincho-overlay" id="overlay" onclick="closeOutside(event)">
  <div class="guincho-sheet">

    <div class="guincho-top">
      <div class="gente-logo">
        <svg class="gente-star" viewBox="0 0 60 60">
          <polygon points="30,4 56,50 4,50" fill="#1A8CC8"/>
          <polygon points="30,56 4,10 56,10" fill="#1A8CC8"/>
        </svg>
        <div>
          <div class="gente-nome">gente</div>
          <div class="gente-sub">seguradora</div>
        </div>
      </div>
      <div class="close-btn" onclick="closeGuincho()">✕</div>
    </div>

    <!-- CARDS -->
    <div class="guincho-cards">

      <div class="guincho-card">
        <div class="guincho-card-ico">📞</div>
        <div class="guincho-card-lbl">Porto Alegre e região metropolitana</div>
        <div class="guincho-card-num">(51) 3023-8888</div>
      </div>

      <div class="guincho-card">
        <div class="guincho-card-ico">📞</div>
        <div class="guincho-card-lbl">Demais localidades</div>
        <div class="guincho-card-num">0800 602 0088</div>
      </div>

      <div class="guincho-card">
        <div class="guincho-card-ico">💬</div>
        <div class="guincho-card-lbl">Atendimento no WhatsApp</div>
        <div class="guincho-card-num">(51) 99993-1300</div>
      </div>

    </div>

    <!-- INFO -->
    <div class="guincho-info">
      <strong>Contratante:</strong><br>
      Prefeitura Municipal de Araçatuba<br><br>

      <strong>CNPJ:</strong><br>
      45.511.847/0001-79<br><br>

      <strong>Endereço:</strong><br>
      Rua Dona Ida, 1284<br>
      Araçatuba - SP
    </div>

  </div>
</div>

<script>
function openGuincho(){
  document.getElementById('overlay').classList.add('show')
}

function closeGuincho(){
  document.getElementById('overlay').classList.remove('show')
}

function closeOutside(e){
  if(e.target.id === 'overlay'){
    closeGuincho()
  }
}

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.update();
  });
}
</script>

</body>
</html>
